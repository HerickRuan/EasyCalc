<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/velIn.css">
    <title>Tempo de Download</title>
</head>
<body>
    <a href="../index.html"><h1 id="title">Tempo de Download</h1></a>

    <div id="main">
        <div>
            <input id="inVel" type="number" placeholder="Velocidade">
            <select id="selUniVel">
                <option value="MB/s">MB/s</option>
                <option value="Mb/s">Mb/s</option>
            </select>
        </div>
        <div>
            <input id="inSize" type="number" placeholder="Tamanho do arquivo">
            <select name="test" id="selUniSize">
                <option value="Gb">Gb</option>
                <option value="Mb">Mb</option>
            </select>
        </div>
    </div>

    <button id="calc" onclick="calc()">CALCULAR</button>
    <p id="res" style="display: none;"></p>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../assets/js/velIn.js"></script>

</html>
